[project]
name = "llm-experiments"
version = "0.1.0"
description = "Random llm experiments"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Vishvam", email = "s.vishvam1025@gmail.com" }]
dependencies = [
    "accelerate>=1.13.0",
    "catppuccin>=2.5.0",
    "datasets>=4.8.4",
    "hf-transfer>=0.1.9",
    "matplotlib>=3.10.8",
    "mlx-lm>=0.31.2",
    "scikit-learn>=1.8.0",
    "torch>=2.11.0",
    "transformers>=5.5.4",
    "umap-learn>=0.5.12",
]

[dependency-groups]
dev = ["ruff>=0.15.11"]

[tool.ruff]
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "*_pb2*.py*",         # gRPC auto-generated files
]

line-length = 80
indent-width = 4
target-version = "py314"

[tool.ruff.lint]
exclude = ["*_pb2*.py"]
select = ["E4", "E7", "E9", "F"]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.pycodestyle]
ignore-overlong-task-comments = false
max-doc-length = 80

[tool.ruff.format]
exclude = ["*_pb2*.py"]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
